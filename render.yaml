services:
  - type: web
    name: bulk-users-api
    env: node
    plan: free # Deploys to Render's free tier
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.20.2 # Or any other LTS version you prefer
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Important: Add your real MongoDB URI securely inside your Render dashboard, NOT HERE!
